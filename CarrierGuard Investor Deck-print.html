<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CarrierGuard — Investor Deck (print)</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="deck-slides.css" />
<style>
  html, body { margin: 0; height: 100%; background: #0e0d0c; }
  deck-stage { position: fixed; inset: 0; }
</style>
<style media="print">
  /* force brand colours + freeze entrance animations at their end state */
  *, *::before, *::after {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    animation-delay: -99s !important;
    animation-duration: .001s !important;
    animation-iteration-count: 1 !important;
    animation-fill-mode: both !important;
    animation-play-state: running !important;
    transition-duration: 0s !important;
  }
  .cg-anim { opacity: 1 !important; transform: none !important; }
</style>
</head>
<body>
  <deck-stage id="deck" width="1280" height="720" aria-label="CarrierGuard investor deck"></deck-stage>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="image-slot.js"></script>

  <script type="text/babel" src="deck/kit.jsx"></script>
  <script type="text/babel" src="deck/slides-title.jsx"></script>
  <script type="text/babel" src="deck/slides-a.jsx"></script>
  <script type="text/babel" src="deck/slides-b.jsx"></script>
  <script type="text/babel" src="deck/slides-c.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const slides = [
      window.CGS0,
      window.CGS1, window.CGS2, window.CGS3, window.CGS4, window.CGS5, window.CGS6, window.CGS7,
      window.CGS8, window.CGS9, window.CGS10, window.CGS11, window.CGS12, window.CGS13,
    ];
    const deck = document.getElementById("deck");
    slides.forEach((S) => {
      const sec = document.createElement("section");
      const mount = document.createElement("div");
      sec.appendChild(mount);
      deck.appendChild(sec);
      ReactDOM.createRoot(mount).render(React.createElement(S));
    });

    // Load the deck shell AFTER slides are mounted so print layout sees real content.
    const s = document.createElement("script");
    s.src = "deck-stage.js";
    s.onload = function () {
      const ready = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
      ready.then(function () {
        // let deck-stage finish laying out, then open the print dialog
        setTimeout(function () { window.print(); }, 700);
      });
    };
    document.body.appendChild(s);
  </script>
</body>
</html>
