  <!-- All JSX inlined into one block so Babel transpiles everything before render runs -->
  <script type="text/babel" data-presets="env,react">

/* ============================================================ KIT */
const { useState } = React;

function Mark({ size = 28, theme = "light", style, className }) {
  const p = theme === "dark"
    ? { dark: "#FDFCF9", sage: "#D1E8D8" }
    : { dark: "#1C1917", sage: "#4D7C5F" };
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" role="img" aria-label="CarrierGuard" className={className}
      style={{ display: "block", flexShrink: 0, ...style }}>
      <rect x="0" y="0" width="46" height="46" rx="4" fill={p.dark} />
      <rect x="54" y="0" width="46" height="46" rx="4" fill={p.sage} />
      <rect x="0" y="54" width="46" height="46" rx="4" fill={p.sage} />
      <rect x="54" y="54" width="46" height="46" rx="4" fill={p.dark} />
    </svg>
  );
}

function Wordmark({ size = 22, theme = "light" }) {
  const color = theme === "dark" ? "#FDFCF9" : "#1C1917";
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: size * 0.42 }}>
      <Mark size={size} theme={theme} />
      <span style={{ fontSize: size * 0.82, color, letterSpacing: "-0.01em", lineHeight: 1, whiteSpace: "nowrap" }}>
        <span style={{ fontWeight: 400 }}>Carrier</span><span style={{ fontWeight: 500 }}>Guard</span>
      </span>
    </span>
  );
}

function Eyebrow({ children, theme = "light", className = "" }) {
  return (
    <span className={"cg-eb " + className}>
      <span className="cg-eb__rule" />
      <span className="cg-eb__txt">{children}</span>
    </span>
  );
}

function Foot({ theme = "light", page, label }) {
  return (
    <div className="cg-foot">
      <Wordmark size={16} theme={theme} />
      <span style={{ whiteSpace: "nowrap" }}>{label}</span>
      <span style={{ fontVariantNumeric: "tabular-nums", whiteSpace: "nowrap" }}>{page}</span>
    </div>
  );
}

function Tag({ tone = "neutral", dot = true, children, style }) {
  const tones = {
    verified: { bg: "var(--cg-sage-light)", color: "var(--cg-sage)", d: "var(--cg-sage)" },
    review:   { bg: "var(--cg-caution-light)", color: "var(--cg-caution)", d: "var(--cg-caution)" },
    neutral:  { bg: "var(--cg-white)", color: "var(--cg-muted)", d: "var(--cg-very-muted)", border: "var(--cg-border)" },
    inverse:  { bg: "var(--cg-primary)", color: "var(--cg-background)", d: "var(--cg-sage-light)" },
  };
  const t = tones[tone] || tones.neutral;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 6, fontFamily: "var(--font-sans)",
      fontSize: 11, fontWeight: 500, letterSpacing: "0.04em", textTransform: "uppercase", lineHeight: 1,
      padding: "6px 10px", borderRadius: "var(--radius-pill)", background: t.bg, color: t.color,
      border: t.border ? `1px solid ${t.border}` : "1px solid transparent", whiteSpace: "nowrap", ...style }}>
      {dot && <span style={{ width: 6, height: 6, borderRadius: "50%", background: t.d, flexShrink: 0 }} />}
      {children}
    </span>
  );
}

function Icon({ d, size = 20, fill = "none", style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
      strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" style={{ display: "block", ...style }}>
      {d}
    </svg>
  );
}

  scale: <><path d="M12 3v18"/><path d="M7 7h10"/><path d="M5 21h14"/><path d="M7 7l-3 6a3 3 0 0 0 6 0L7 7z"/><path d="M17 7l-3 6a3 3 0 0 0 6 0l-3-6z"/></>,
  cpu: <><rect x="6" y="6" width="12" height="12" rx="2"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/><rect x="9" y="9" width="6" height="6" rx="1"/></>,

  userPlus: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></>,
  banknote: <><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/><path d="M6 12h.01M18 12h.01"/></>,
  building: <><rect x="4" y="2" width="16" height="20" rx="1.5"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M12 6h.01M16 6h.01M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h.01"/></>,
  seed: <><path d="M12 22V12"/><path d="M12 12C12 8 9 6 4 6c0 5 3 7 8 6z"/><path d="M12 14c0-4 3-6 8-6 0 5-3 7-8 6z"/></>,
  coins: <><circle cx="8" cy="8" r="5"/><path d="M16.7 4.3a5 5 0 0 1 0 9.4"/><path d="M19 18.7a5 5 0 0 1-7 0"/><path d="M3 13v3c0 1.7 2.2 3 5 3s5-1.3 5-3v-3"/></>,

  hand: <><path d="M11 14V5.5a1.5 1.5 0 0 1 3 0V12"/><path d="M14 11.5a1.5 1.5 0 0 1 3 0V13"/><path d="M17 12.5a1.5 1.5 0 0 1 3 0V16a6 6 0 0 1-6 6h-2a7 7 0 0 1-5-2l-3.3-3.4a1.5 1.5 0 0 1 2.1-2.1L8 14V6.5a1.5 1.5 0 0 1 3 0V12"/></>,

function NodeIcon({ d, tone = "ink", size = 22 }) {
  const map = {
    ink: { c: "var(--cg-primary)" },
    sage: { c: "var(--cg-sage)" },
    caution: { c: "var(--cg-caution)" },
    light: { c: "var(--cg-background)" },
  };
  return <span style={{ color: map[tone].c, display: "inline-flex" }}><Icon d={d} size={size} /></span>;
}

/* ============================================================ SLIDE 00 TITLE */
function SlideTitle() {
  return (
    <div className="cg-slide cg-slide--dark">
      <Mark className="cg-bgmark" size={660} theme="dark" style={{ right: -190, bottom: -210 }} />
      <div className="cg-pad" style={{ paddingBottom: 56 }}>
        <div className="cg-anim cg-anim-1" style={{ display: "flex", alignItems: "center" }}>
          <Wordmark size={24} theme="dark" />
        </div>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", maxWidth: 1000 }}>
          <Eyebrow className="cg-anim cg-anim-2">Investor brief</Eyebrow>
          <h1 className="cg-anim cg-anim-3" style={{ margin: "26px 0 0", fontSize: 62, fontWeight: 500, letterSpacing: "-0.03em", lineHeight: 1.05, color: "var(--cg-background)", textWrap: "balance" }}>
            The trust infrastructure logistics has never had
          </h1>
          <p className="cg-anim cg-anim-4" style={{ margin: "26px 0 0", maxWidth: 700, fontSize: 19, lineHeight: 1.6, color: "rgba(253,252,249,0.72)" }}>
            CarrierGuard verifies carriers before a load is ever assigned, turning fragmented signals into a clear, traceable risk view in seconds.
          </p>
        </div>
        <div className="cg-anim cg-anim-5" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", fontSize: 13, color: "rgba(253,252,249,0.5)" }}>
          <span style={{ letterSpacing: "0.04em" }}>carrierguard.eu</span>
          <span style={{ letterSpacing: "0.08em", textTransform: "uppercase", whiteSpace: "nowrap" }}>Carrier fraud prevention for freight</span>
          <span style={{ fontVariantNumeric: "tabular-nums", letterSpacing: "0.06em", whiteSpace: "nowrap" }}>01</span>
        </div>
      </div>
    </div>

}

/* ============================================================ SLIDE 01 MARKET */
function FlowNode({ icon, name, sub, tone = "neutral", badge }) {
  const isRisk = tone === "risk";
  return (
    <div style={{ position: "relative", flex: "0 0 180px" }}>
      {badge && (
        <div style={{ position: "absolute", top: -34, left: "50%", transform: "translateX(-50%)" }}>
          <Tag tone="review">{badge}</Tag>
        </div>
      )}
      <div style={{
        background: isRisk ? "var(--cg-caution-light)" : "var(--cg-white)",
        border: isRisk ? "1.5px solid var(--cg-caution)" : (tone === "sage" ? "1.5px solid var(--cg-sage)" : "1px solid var(--cg-border)"),
        borderRadius: "var(--radius-lg)", padding: "22px 20px", boxShadow: "var(--shadow-xs)", textAlign: "center",
      }}>
        <span style={{ color: isRisk ? "var(--cg-caution)" : (tone === "sage" ? "var(--cg-sage)" : "var(--cg-primary)"), display: "inline-flex" }}>
          <Icon d={icon} size={26} />
        </span>
        <div style={{ fontSize: 16, fontWeight: 500, marginTop: 12, color: "var(--cg-primary)" }}>{name}</div>
        <div style={{ fontSize: 12, color: "var(--cg-muted)", marginTop: 5, lineHeight: 1.45 }}>{sub}</div>
      </div>
      {isRisk && (
        <div style={{ display: "flex", justifyContent: "center", gap: 10, marginTop: 12, color: "var(--cg-caution)" }}>
          <Icon d={Ic.alert} size={18} /><Icon d={Ic.alert} size={18} /><Icon d={Ic.alert} size={18} />
        </div>
      )}
    </div>
  );
}
function FlowArrow({ label }) {
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 7, marginTop: -16, minWidth: 56 }}>
      <span style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.12em", color: "var(--cg-very-muted)" }}>{label}</span>
      <div style={{ display: "flex", alignItems: "center", width: "100%", color: "var(--cg-border)" }}>
        <div style={{ flex: 1, height: 1.5, background: "var(--cg-border)" }} />
        <Icon d={Ic.arrowR} size={18} style={{ color: "var(--cg-very-muted)", marginLeft: -2 }} />
      </div>
    </div>
  );
}
function Slide01() {
  return (
    <div className="cg-slide">
      <div className="cg-pad">
        <Eyebrow className="cg-anim cg-anim-1">Market</Eyebrow>
        <h1 className="cg-anim cg-anim-2" style={{ margin: "22px 0 0", fontSize: 31, fontWeight: 500, letterSpacing: "-0.02em", lineHeight: 1.25, maxWidth: 1140 }}>
          In the $11T global logistics market, cargo owners outsource transport to freight forwarders, who subcontract to carriers.
        </h1>
        <div className="cg-anim cg-anim-3" style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 78, paddingTop: 8 }}>
          <FlowNode icon={Ic.factory} name="Manufacturer" sub="Needs goods delivered" tone="neutral" />
          <FlowArrow label="books" />
          <FlowNode icon={Ic.globe} name="Freight forwarder" sub="Organises the shipment" tone="sage" />
          <FlowArrow label="hires" />
          <FlowNode icon={Ic.truck} name="Carrier" sub="Moves the goods" tone="risk" badge="Theft risk" />
          <FlowArrow label="delivers" />
          <FlowNode icon={Ic.store} name="Destination" sub="e.g. retail stores" tone="neutral" />
        </div>
        <div className="cg-anim cg-anim-4" style={{ marginTop: 30, fontSize: 13, color: "var(--cg-muted)", textAlign: "center", lineHeight: 1.5 }}>
          70–80% of shipments go via a freight forwarder. In 20–30% of cases, manufacturers book carriers directly.
        </div>
        <div className="cg-anim cg-anim-5" style={{ display: "flex", alignItems: "center", gap: 16, marginTop: 30, padding: "22px 34px",
          background: "var(--cg-caution-light)", border: "1px solid var(--cg-caution)", borderRadius: "var(--radius-lg)", maxWidth: 1140, marginLeft: "auto", marginRight: "auto" }}>
          <span style={{ color: "var(--cg-caution)", flexShrink: 0, display: "inline-flex" }}><Icon d={Ic.alert} size={24} /></span>
          <p style={{ margin: 0, fontSize: 16, fontWeight: 500, lineHeight: 1.5, color: "var(--cg-primary)" }}>
            The carrier is the only actor who physically handles the client's goods, making it the primary risk for cargo fraud.
          </p>
        </div>
      </div>
      <Foot page="02" label="Market structure" />
    </div>
  );
}

/* ============================================================ SLIDE 02 PROBLEM */
function StatCard({ num, label, note }) {
  return (
    <div style={{ flex: 1, background: "var(--cg-white)", border: "1px solid var(--cg-border)", borderRadius: "var(--radius-lg)", padding: "20px 24px", boxShadow: "var(--shadow-xs)" }}>
      <div className="cg-fig" style={{ fontSize: 44, color: "var(--cg-primary)" }}>{num}{note && <sup style={{ fontSize: 28, color: "var(--cg-caution)", fontWeight: 500, marginLeft: 1, top: "-0.5em" }}>*</sup>}</div>
      <div style={{ fontSize: 12.5, color: "var(--cg-muted)", marginTop: 8, lineHeight: 1.4 }}>{label}</div>
    </div>
  );
}
function Slide02() {
  const how = ["Shell company registered overnight", "Impersonating a real carrier", "Buying aged company for legitimacy", "Hijacking a carrier's platform account"];
  const why = [
    ["Time pressure", "oftentimes, forwarders have minutes to decide on a carrier"],
    ["Fragmented knowledge", "some players informally exchange intel, but no central intelligence exists"],
    ["No secure infrastructure", "nothing like banks would use"],
  ];
  return (
    <div className="cg-slide">
      <div className="cg-pad">
        <Eyebrow className="cg-anim cg-anim-1">Problem</Eyebrow>
        <div className="cg-anim cg-anim-2" style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 40, marginTop: 18 }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 32, fontWeight: 500, letterSpacing: "-0.02em", lineHeight: 1.14, maxWidth: 1040, textWrap: "balance" }}>
              Cargo theft is a €8.3B annual crisis in the EU, and growing
            </h1>
            <p style={{ margin: "12px 0 0", fontSize: 16, color: "var(--cg-muted)", lineHeight: 1.5, maxWidth: 720 }}>
              The fastest-growing theft method is identity fraud, rather than violent robberies.
            </p>
          </div>
        </div>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", paddingTop: 10, paddingBottom: 44 }}>
          <div className="cg-anim cg-anim-3" style={{ display: "flex", gap: 16 }}>
            <StatCard num="€2.5M" label="stolen per day in the EU" note />
            <StatCard num="€8.3B" label="annual EU losses" />
            <StatCard num="~10%" label="of thefts go reported" />
          </div>
          <div className="cg-anim cg-anim-4" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 40, marginTop: 34 }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.1em", color: "var(--cg-sage)" }}>How fraud happens</div>
              <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 11 }}>
                {how.map((h, i) => (
                  <div key={i} style={{ display: "flex", gap: 12, alignItems: "baseline", fontSize: 14.5, color: "var(--cg-primary)", lineHeight: 1.4 }}>
                    <span style={{ width: 5, height: 5, borderRadius: "50%", background: "var(--cg-caution)", flexShrink: 0, transform: "translateY(-2px)" }} />{h}
                  </div>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 11, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.1em", color: "var(--cg-sage)" }}>Why it keeps working</div>
              <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 10 }}>
                {why.map(([k, v], i) => (
                  <div key={i} style={{ fontSize: 14, color: "var(--cg-muted)", lineHeight: 1.45 }}>
                    <span style={{ fontWeight: 500, color: "var(--cg-primary)" }}>{k}:</span> {v}
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="cg-anim cg-anim-5" style={{ marginTop: 34, borderLeft: "2px solid var(--cg-sage)", paddingLeft: 22 }}>
            <p style={{ margin: 0, fontSize: 17, fontWeight: 500, lineHeight: 1.45, color: "var(--cg-primary)", letterSpacing: "-0.01em", maxWidth: 980 }}>
              Banks conduct extensive checks before trusting anyone with money. Forwarders hand over a load to a carrier they found 20 minutes ago.
            </p>
          </div>
        </div>
      </div>
      <div className="cg-foot">
        <span style={{ whiteSpace: "nowrap", textTransform: "none", letterSpacing: 0, color: "var(--cg-muted)", lineHeight: 1.45, fontSize: 11.5 }}>
          <span style={{ color: "var(--cg-caution)", fontWeight: 500 }}>*</span> Experts believe only 10–15% of cargo thefts are ever reported. In CEE, which has the most carriers in the EU, there are almost no statistics at all.
        </span>
        <span style={{ fontVariantNumeric: "tabular-nums" }}>03</span>
      </div>
    </div>
  );
}

/* ============================================================ SLIDE 03 SOLUTION */
function CycleNode({ title, sub, tone }) {

  const mount = document.createElement("div");
  sec.appendChild(mount);
  deck.appendChild(sec);
  ReactDOM.createRoot(mount).render(React.createElement(S));
});

const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function animateIn(slide) {
  if (!slide || reduce) return;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    slide.querySelectorAll(".cg-anim").forEach((node) => {
      const m = (node.className.match(/cg-anim-(\d)/) || [])[1];
      const delay = m ? parseInt(m, 10) * 70 : 60;
      node.animate(
        [{ opacity: 0, transform: "translateY(12px)" }, { opacity: 1, transform: "none" }],
        { duration: 460, delay, easing: "cubic-bezier(0.22, 1, 0.36, 1)" }
      );
    });
  }));
}
deck.addEventListener("slidechange", (e) => animateIn(e.detail.slide));

// Load deck-stage AFTER slides are mounted so thumbnails + nav see real content.
