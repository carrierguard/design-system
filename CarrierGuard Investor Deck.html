<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CarrierGuard — Investor Deck</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="deck-slides.css" />
<style>
  html, body { margin: 0; height: 100%; background: #0e0d0c; }
  deck-stage { position: fixed; inset: 0; }
</style>
</head>
<body>
  <deck-stage id="deck" width="1280" height="720" aria-label="CarrierGuard investor deck"></deck-stage>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="image-slot.js"></script>

  <script type="text/babel" src="deck/kit.jsx"></script>
  <script type="text/babel" src="deck/slides-title.jsx"></script>
  <script type="text/babel" src="deck/slides-a.jsx"></script>
  <script type="text/babel" src="deck/slides-b.jsx"></script>
  <script type="text/babel" src="deck/slides-c.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const slides = [
      window.CGS0,
      window.CGS1, window.CGS2, window.CGS3, window.CGS4, window.CGS5, window.CGS6, window.CGS7,
      window.CGS8, window.CGS9, window.CGS10, window.CGS11, window.CGS12, window.CGS13,
    ];
    const deck = document.getElementById("deck");
    slides.forEach((S) => {
      const sec = document.createElement("section");
      const mount = document.createElement("div");
      sec.appendChild(mount);
      deck.appendChild(sec);
      ReactDOM.createRoot(mount).render(React.createElement(S));
    });

    // Gentle, on-brand entrance: fade + small rise on the active slide's
    // .cg-anim elements. Driven from JS because CSS animations on slotted
    // content under <deck-stage> never receive a start time. Deferred two
    // frames so the slide is laid out and visible before the timeline ticks.
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    function animateIn(slide) {
      if (!slide || reduce) return;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        slide.querySelectorAll(".cg-anim").forEach((node) => {
          const m = (node.className.match(/cg-anim-(\d)/) || [])[1];
          const delay = m ? parseInt(m, 10) * 70 : 60;
          node.animate(
            [{ opacity: 0, transform: "translateY(12px)" }, { opacity: 1, transform: "none" }],
            { duration: 460, delay, easing: "cubic-bezier(0.22, 1, 0.36, 1)" }
          );
        });
      }));
    }
    deck.addEventListener("slidechange", (e) => animateIn(e.detail.slide));

    // Load the deck shell AFTER slides are mounted so thumbnails + nav see real content.
    const s = document.createElement("script");
    s.src = "deck-stage.js";
    document.body.appendChild(s);
  </script>
</body>
</html>
